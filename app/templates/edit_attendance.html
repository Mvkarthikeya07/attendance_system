{% extends "base.html" %}
{% block title %}Edit Attendance Record{% endblock %}

{% block content %}
<div class="container-sm">
  <div class="page-header"><h1>✏️ Edit Attendance Record</h1></div>

  <div class="card">
    <form method="POST" action="/update">
      <input type="hidden" name="id" value="{{ record[0] }}">

      <div class="form-group">
        <label>Student Name</label>
        <input type="text" value="{{ record[1] }}" disabled>
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" value="{{ record[2] }}" required>
      </div>
      <div class="form-group">
        <label for="time">Time</label>
        <input type="time" id="time" name="time" value="{{ record[3] }}" required>
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status" required>
          <option value="PRESENT" {% if record[4]=='PRESENT' %}selected{% endif %}>PRESENT</option>
          <option value="ABSENT"  {% if record[4]=='ABSENT'  %}selected{% endif %}>ABSENT</option>
          <option value="LATE"    {% if record[4]=='LATE'    %}selected{% endif %}>LATE</option>
        </select>
      </div>
      <div class="form-group">
        <label for="late_minutes">Late Minutes</label>
        <input type="number" id="late_minutes" name="late_minutes" value="{{ record[5] }}" min="0">
      </div>

      <button type="submit" class="btn btn-block">Update Record</button>
    </form>

    <a href="/records" class="back-link">← Back to Records</a>
  </div>
</div>
{% endblock %}
